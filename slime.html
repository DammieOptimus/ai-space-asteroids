<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slime Mold: Neural Network</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Absolute black */
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ffcc; /* Neon cyan text */
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="ui">Organism Status: Growing...<br>Agents: 4,000</div>
    <canvas id="slimeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('slimeCanvas');
        // WillReadFrequently tells the browser we will be scanning the pixels a lot, optimizing it!
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let width, height;
        let agents = [];
        const numAgents = 4000;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
            // Fill background instantly
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, width, height);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- THE SLIME AGENT ---
        class Agent {
            constructor() {
                // Start all agents in a chaotic circle in the center
                let radius = Math.random() * (Math.min(width, height) / 3);
                let angle = Math.random() * Math.PI * 2;
                
                this.x = width / 2 + Math.cos(angle) * radius;
                this.y = height / 2 + Math.sin(angle) * radius;
                
                // Pointing inward or outward randomly
                this.angle = Math.random() * Math.PI * 2;
                
                // Agent DNA (How it moves and smells)
                this.speed = 2;
                this.sensorDist = 20;   // How far ahead it can smell
                this.sensorAngle = 0.5; // How wide the left/right sensors are
                this.turnSpeed = 0.2;   // How sharply it can turn
            }

            update(pixels) {
                // Calculate the exact pixel coordinate of the 3 sensors
                let angleF = this.angle; // Forward
                let angleL = this.angle - this.sensorAngle; // Left
                let angleR = this.angle + this.sensorAngle; // Right

                // Smell the chemical trails at those 3 spots
                let valF = this.smell(this.x + Math.cos(angleF) * this.sensorDist, this.y + Math.sin(angleF) * this.sensorDist, pixels);
                let valL = this.smell(this.x + Math.cos(angleL) * this.sensorDist, this.y + Math.sin(angleL) * this.sensorDist, pixels);
                let valR = this.smell(this.x + Math.cos(angleR) * this.sensorDist, this.y + Math.sin(angleR) * this.sensorDist, pixels);

                // Brain Logic: Steer based on smell
                if (valF > valL && valF > valR) {
                    // Strongest smell is straight ahead, keep going!
                    this.angle += 0;
                } else if (valF < valL && valF < valR) {
                    // Strong smell on both sides, pick left or right randomly to split up
                    this.angle += (Math.random() > 0.5 ? this.turnSpeed : -this.turnSpeed);
                } else if (valL > valR) {
                    // Left smells better
                    this.angle -= this.turnSpeed;
                } else if (valR > valL) {
                    // Right smells better
                    this.angle += this.turnSpeed;
                }

                // Add a tiny bit of random wandering so they don't get permanently stuck
                this.angle += (Math.random() - 0.5) * 0.1;

                // Move forward
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Screen wrap (The petri dish is infinite)
                if (this.x < 0) this.x += width;
                if (this.x >= width) this.x -= width;
                if (this.y < 0) this.y += height;
                if (this.y >= height) this.y -= height;
            }

            // Function to grab the exact brightness of a pixel from the screen
            smell(sensorX, sensorY, pixels) {
                // Ensure the sensor wraps around the screen perfectly too
                let sx = Math.floor(sensorX);
                let sy = Math.floor(sensorY);
                if (sx < 0) sx += width;
                if (sx >= width) sx -= width;
                if (sy < 0) sy += height;
                if (sy >= height) sy -= height;

                // Mathematics to find the exact pixel in the giant screen array
                // Arrays store pixels as Red, Green, Blue, Alpha (4 slots per pixel)
                let index = (sy * width + sx) * 4;
                
                // Return the Green value (since we are drawing neon green/cyan trails)
                return pixels[index + 1]; 
            }
        }

        // Create the army of agents
        for (let i = 0; i < numAgents; i++) {
            agents.push(new Agent());
        }

        // --- THE ANIMATION LOOP ---
        function gameLoop() {
            // 1. Take a snapshot of the current screen to give to the agents to "smell"
            let imgData = ctx.getImageData(0, 0, width, height);
            let pixels = imgData.data;

            // 2. Dim the lights! (This makes the trails slowly fade away)
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, width, height);

            // 3. Prepare to draw the agents
            ctx.fillStyle = "#00ffcc"; // Neon Cyan/Green

            // We use one giant path to draw all 4000 dots instantly (much faster for the computer)
            ctx.beginPath();
            
            for (let agent of agents) {
                agent.update(pixels); // Let them think and move
                ctx.rect(agent.x, agent.y, 1.5, 1.5); // Draw their new dot
            }
            
            ctx.fill(); // Paint them all onto the screen!

            requestAnimationFrame(gameLoop);
        }

        // Start the experiment
        gameLoop();
    </script>
</body>
</html>
