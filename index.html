<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Space Asteroids</title>
    <style>
        /* THE PAINT (CSS) */
        /* This removes margins and scrollbars so the black space fills the whole screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510; /* Deep dark space blue/black */
            overflow: hidden; /* No scrollbars allowed */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <!-- THE CANVAS (HTML) -->
    <!-- This is the digital glass we will draw the glowing shapes on -->
    <canvas id="gameCanvas"></canvas>

    <!-- THE BRAIN (JavaScript) -->
    <script>
        // --- 1. SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Make the canvas fit the screen perfectly
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game objects
        let ship;
        let asteroids = [];
        let lasers = [];
        let particles = [];
        let wave = 3; // Number of asteroids to start with

        // --- 2. BLUEPRINTS FOR OUR OBJECTS ---

        // The AI Spaceship
        class Ship {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.radius = 15;
                this.angle = 0;
                this.vx = 0; // Velocity X
                this.vy = 0; // Velocity Y
                this.cooldown = 0; // Time before it can shoot again
            }

            // The "Brain" of the ship
            think() {
                if (asteroids.length === 0) return;

                // 1. Find the closest asteroid
                let closest = null;
                let minDistance = Infinity;

                for (let ast of asteroids) {
                    let dx = ast.x - this.x;
                    let dy = ast.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDistance) {
                        minDistance = dist;
                        closest = ast;
                    }
                }

                if (closest) {
                    // 2. Calculate the angle to the closest asteroid
                    let targetAngle = Math.atan2(closest.y - this.y, closest.x - this.x);
                    
                    // 3. Smoothly rotate towards that angle
                    let diff = targetAngle - this.angle;
                    // Keep the math clean so it doesn't spin wildly
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    
                    this.angle += diff * 0.1; // The '0.1' makes turning smooth, not instant

                    // 4. If pointing generally at the target, SHOOT!
                    if (Math.abs(diff) < 0.2 && this.cooldown <= 0) {
                        this.shoot();
                    }

                    // 5. Gently pulse the engine to drift around like a real spaceship
                    this.vx += Math.cos(this.angle) * 0.05;
                    this.vy += Math.sin(this.angle) * 0.05;
                }
            }

            shoot() {
                lasers.push(new Laser(this.x, this.y, this.angle));
                this.cooldown = 15; // Wait 15 frames before shooting again
            }

            update() {
                this.think();
                if (this.cooldown > 0) this.cooldown--;

                // Apply friction so it doesn't fly too fast
                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;

                // Screen Wrap (If it flies off screen, it comes back on the other side)
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Neon glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00ffff"; // Cyan
                ctx.strokeStyle = "#00ffff";
                ctx.lineWidth = 2;

                // Draw a sleek triangle ship
                ctx.beginPath();
                ctx.moveTo(this.radius, 0); // Nose
                ctx.lineTo(-this.radius, this.radius * 0.7); // Left wing
                ctx.lineTo(-this.radius * 0.5, 0); // Back engine
                ctx.lineTo(-this.radius, -this.radius * 0.7); // Right wing
                ctx.closePath();
                ctx.stroke();
                
                ctx.restore();
            }
        }

        // The Asteroids
        class Asteroid {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.angle = Math.random() * Math.PI * 2;
                let speed = (Math.random() * 2) + 0.5;
                this.vx = Math.cos(this.angle) * speed;
                this.vy = Math.sin(this.angle) * speed;
                this.vertices = Math.floor(Math.random() * 5) + 7; // Jagged rocks
                this.offsets = [];
                for(let i=0; i<this.vertices; i++){
                    this.offsets.push(Math.random() * 0.4 + 0.8);
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Screen Wrap
                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Neon glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff00ff"; // Pink/Purple
                ctx.strokeStyle = "#ff00ff";
                ctx.lineWidth = 2;

                // Draw jagged rock
                ctx.beginPath();
                for (let i = 0; i < this.vertices; i++) {
                    let a = (i / this.vertices) * Math.PI * 2;
                    let r = this.radius * this.offsets[i];
                    let x = Math.cos(a) * r;
                    let y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }
        }

        // The Lasers
        class Laser {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                let speed = 10;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 60; // Disappears after flying a bit
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00ff00"; // Neon Green
                ctx.fillStyle = "#00ff00";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // The Explosion Particles
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0; // Acts as opacity (fades out)
                this.decay = Math.random() * 0.02 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life; // Makes it fade away
                ctx.fillStyle = "#ffaa00"; // Orange dust
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 3. GAME LOGIC & ANIMATION LOOP ---

        function spawnWave() {
            for (let i = 0; i < wave; i++) {
                // Spawn away from center so it doesn't instantly kill the ship
                let x = Math.random() < 0.5 ? Math.random() * canvas.width * 0.2 : canvas.width - (Math.random() * canvas.width * 0.2);
                let y = Math.random() < 0.5 ? Math.random() * canvas.height * 0.2 : canvas.height - (Math.random() * canvas.height * 0.2);
                asteroids.push(new Asteroid(x, y, 40)); // Size 40 is big asteroid
            }
            wave++; // Next wave is harder!
        }

        function init() {
            ship = new Ship();
            asteroids = [];
            lasers = [];
            particles = [];
            wave = 3;
            spawnWave();
        }

        function gameLoop() {
            // Clear the screen for the next frame with a slight trailing effect
            ctx.fillStyle = "rgba(5, 5, 16, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw ship
            ship.update();
            ship.draw();

            // Update and draw lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].update();
                lasers[i].draw();
                if (lasers[i].life <= 0) {
                    lasers.splice(i, 1); // Remove dead lasers
                }
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Update asteroids and check collisions
            for (let i = asteroids.length - 1; i >= 0; i--) {
                let ast = asteroids[i];
                ast.update();
                ast.draw();

                // Did a laser hit an asteroid?
                for (let j = lasers.length - 1; j >= 0; j--) {
                    let laser = lasers[j];
                    let dx = ast.x - laser.x;
                    let dy = ast.y - laser.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < ast.radius) {
                        // COLLISION!
                        lasers.splice(j, 1); // Delete laser
                        
                        // Explosion particles
                        for(let p=0; p<15; p++) particles.push(new Particle(ast.x, ast.y));

                        // Break asteroid into smaller pieces if it's big enough
                        if (ast.radius > 15) {
                            asteroids.push(new Asteroid(ast.x, ast.y, ast.radius / 2));
                            asteroids.push(new Asteroid(ast.x, ast.y, ast.radius / 2));
                        }
                        
                        asteroids.splice(i, 1); // Delete the broken asteroid
                        break; // Move to next asteroid
                    }
                }
            }

            // If all asteroids are destroyed, start a new wave!
            if (asteroids.length === 0) {
                spawnWave();
            }

            // This tells the browser to run this loop again as fast and smooth as possible
            requestAnimationFrame(gameLoop);
        }

        // Start the game!
        init();
        gameLoop();
    </script>
</body>
</html>
