<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm AI: Predator vs. Prey</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020510; /* Deep oceanic/space blue */
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">Swarm Intelligence Running...<br>Rules: Separation, Alignment, Cohesion, Flee!</div>
    <canvas id="boidCanvas"></canvas>

    <script>
        const canvas = document.getElementById('boidCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        let width, height;
        let flock = [];
        let predator;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            width = canvas.width;
            height = canvas.height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- MATH HELPER FUNCTIONS ---
        // Limit a vector (speed/steering) so things don't teleport instantly
        function limit(vector, max) {
            let magnitude = Math.sqrt(vector.x * vector.x + vector.y * vector.y);
            if (magnitude > max) {
                vector.x = (vector.x / magnitude) * max;
                vector.y = (vector.y / magnitude) * max;
            }
            return vector;
        }

        function distance(boid1, boid2) {
            let dx = boid1.x - boid2.x;
            let dy = boid1.y - boid2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // --- THE PREY (BOIDS) ---
        class Boid {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.maxSpeed = 4; // How fast they fly
                this.maxForce = 0.1; // How fast they can turn
                this.color = `hsl(${Math.random() * 40 + 180}, 100%, 60%)`; // Cyan/Blue variants
            }

            think(flock, predator) {
                let align = { x: 0, y: 0 };
                let cohesion = { x: 0, y: 0 };
                let separation = { x: 0, y: 0 };
                let flee = { x: 0, y: 0 };
                
                let perceptionRadius = 75; // How far a boid can see
                let total = 0;

                // Rule 4: Evade Predator (Highest Priority)
                let dPred = distance(this, predator);
                if (dPred < 150) { // If predator is within 150 pixels, PANIC!
                    flee.x = this.x - predator.x;
                    flee.y = this.y - predator.y;
                    let fleeMag = Math.sqrt(flee.x * flee.x + flee.y * flee.y);
                    flee.x = (flee.x / fleeMag) * this.maxSpeed;
                    flee.y = (flee.y / fleeMag) * this.maxSpeed;
                }

                // Check all other boids for the 3 normal rules
                for (let other of flock) {
                    let d = distance(this, other);
                    
                    if (other !== this && d < perceptionRadius) {
                        // 1. Alignment (match speed/direction)
                        align.x += other.vx;
                        align.y += other.vy;
                        
                        // 2. Cohesion (move to center of group)
                        cohesion.x += other.x;
                        cohesion.y += other.y;
                        
                        // 3. Separation (don't crash into neighbors)
                        if (d < 30) {
                            let diffX = this.x - other.x;
                            let diffY = this.y - other.y;
                            // The closer they are, the harder they push away
                            separation.x += diffX / d;
                            separation.y += diffY / d;
                        }
                        total++;
                    }
                }

                if (total > 0) {
                    // Average out the alignment and cohesion
                    align.x /= total; align.y /= total;
                    cohesion.x /= total; cohesion.y /= total;
                    
                    // Steer towards cohesion point
                    cohesion.x = cohesion.x - this.x;
                    cohesion.y = cohesion.y - this.y;

                    // Normalize rules so they have realistic steering
                    align = limit(align, this.maxForce);
                    cohesion = limit(cohesion, this.maxForce);
                    separation = limit(separation, this.maxForce * 1.5); // Separation is slightly stronger
                }

                // Apply forces (Fleeing is 5x stronger than normal flying!)
                this.vx += align.x + cohesion.x + separation.x + (flee.x * 5);
                this.vy += align.y + cohesion.y + separation.y + (flee.y * 5);

                // Limit max speed
                let currentVel = { x: this.vx, y: this.vy };
                currentVel = limit(currentVel, this.maxSpeed);
                this.vx = currentVel.x;
                this.vy = currentVel.y;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Screen Wrap (Like Asteroids)
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                // Figure out which way the boid is facing
                let angle = Math.atan2(this.vy, this.vx);
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                // Draw a sleek arrowhead shape
                ctx.beginPath();
                ctx.moveTo(8, 0); // Nose
                ctx.lineTo(-6, 5); // Bottom wing
                ctx.lineTo(-4, 0); // Back engine
                ctx.lineTo(-6, -5); // Top wing
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        // --- THE PREDATOR ---
        class Predator {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.vx = 2;
                this.vy = 2;
                this.maxSpeed = 4.5; // Slightly faster than the boids!
                this.maxForce = 0.05; // But turns slower (making it fair)
            }

            hunt(flock) {
                // Find the closest boid
                let closest = null;
                let record = Infinity;
                
                for (let boid of flock) {
                    let d = distance(this, boid);
                    if (d < record) {
                        record = d;
                        closest = boid;
                    }
                }

                // Steer aggressively towards the closest prey
                if (closest) {
                    let targetX = closest.x - this.x;
                    let targetY = closest.y - this.y;
                    
                    let steer = { x: targetX, y: targetY };
                    steer = limit(steer, this.maxForce);
                    
                    this.vx += steer.x;
                    this.vy += steer.y;
                }

                let currentVel = { x: this.vx, y: this.vy };
                currentVel = limit(currentVel, this.maxSpeed);
                this.vx = currentVel.x;
                this.vy = currentVel.y;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Screen Wrap
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                let angle = Math.atan2(this.vy, this.vx);
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                
                ctx.fillStyle = "#ff0044"; // Aggressive Neon Red
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#ff0044";
                
                // Draw a larger, meaner predator ship
                ctx.beginPath();
                ctx.moveTo(15, 0); 
                ctx.lineTo(-10, 10); 
                ctx.lineTo(-5, 0); 
                ctx.lineTo(-10, -10); 
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        // --- BOOT UP THE SIMULATION ---
        function init() {
            flock = [];
            for (let i = 0; i < 200; i++) {
                flock.push(new Boid());
            }
            predator = new Predator();
        }

        function gameLoop() {
            // Fading trail effect
            ctx.fillStyle = "rgba(2, 5, 16, 0.3)";
            ctx.fillRect(0, 0, width, height);

            // Let the predator hunt first
            predator.hunt(flock);
            predator.update();
            predator.draw();

            // Let all boids think and move
            for (let boid of flock) {
                boid.think(flock, predator);
                boid.update();
                boid.draw();
            }

            requestAnimationFrame(gameLoop);
        }

        init();
        gameLoop();
    </script>
</body>
</html>
